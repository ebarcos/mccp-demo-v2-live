<style>
:root{
  --teal:#17b39a; --purple:#8e3b7a; --gold:#e2c391; --muted:#a3bac0;
  --sans:'Archivo',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  --serif:'Fraunces',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);color:#eef5f3;-webkit-font-smoothing:antialiased;line-height:1.45;min-height:100vh;
  background:radial-gradient(1200px 640px at 12% -4%, #164742 0%, transparent 52%),radial-gradient(1100px 720px at 92% 104%, #3d1743 0%, transparent 52%),linear-gradient(135deg,#0b2a27 0%,#10262f 46%,#241038 100%);
  background-attachment:fixed}
.app{max-width:1280px;margin:0 auto;width:100%;min-height:100vh;display:flex;flex-direction:column;padding-bottom:6px}
.brandbar{padding:20px 30px 8px}
.lockup{display:inline-flex;align-items:center;gap:15px}
.lockup svg{width:52px;height:52px;flex:0 0 auto}
.lockup .txt{border-left:2px solid rgba(23,179,154,.45);padding-left:15px}
.lockup .txt .wm{font-size:28px;font-weight:800;letter-spacing:2px;color:#fff;line-height:.95;display:block}
.lockup .txt .claim{font-family:var(--serif);font-size:21px;font-weight:500;font-style:italic;color:#eef7f4;margin-top:5px;display:block;line-height:1.05}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:2px 24px}
.slide{width:100%;max-width:1120px;min-height:520px;display:flex;flex-direction:column;justify-content:center}
.caption{padding:12px 24px 4px;text-align:center;min-height:70px}
.caption .step{font-size:10.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
.caption h2{font-family:var(--serif);font-size:23px;color:#fff;font-weight:500}
.caption h2 em{font-style:italic;color:var(--gold)}
.caption p{font-size:12.5px;color:#c3d6d1;max-width:660px;margin:6px auto 0}
.seq{display:flex;align-items:center;justify-content:center;gap:14px;padding:10px 24px 20px}
.seq .nav,.seq .play{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#dfeeeb}
.seq .nav{width:40px;height:40px}.seq .play{width:48px;height:48px;background:linear-gradient(135deg,#17b39a,#8e3b7a);border:0;color:#fff}
.seq .nav:hover{border-color:var(--teal);color:#fff}
.seq .nav svg,.seq .play svg{width:19px;height:19px}
.dots{display:flex;gap:7px}
.dots button{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.24);border:0;cursor:pointer;padding:0;transition:.2s}
.dots button.on{background:var(--teal);transform:scale(1.3)}
.dots button.done{background:var(--purple)}
/* ===== componentes de slide ===== */
.kick{font-size:10.5px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:var(--teal);text-align:center}
.h0{font-family:var(--serif);font-size:44px;font-weight:500;color:#fff;text-align:center;line-height:1.12;margin-top:10px}
.h0 em{font-style:italic;color:var(--gold)}
.sub0{font-size:15px;color:#c9dcd6;text-align:center;max-width:760px;margin:14px auto 0;line-height:1.55}
.card{background:rgba(10,24,28,.55);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:18px 20px;backdrop-filter:blur(6px)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:980px){.grid3,.grid5,.grid2{grid-template-columns:1fr}}
.actor{text-align:center;padding:20px 16px}
.actor .ai{width:52px;height:52px;border-radius:16px;margin:0 auto 10px;background:linear-gradient(140deg,rgba(23,179,154,.28),rgba(142,59,122,.22));border:1px solid rgba(23,179,154,.35);display:grid;place-items:center;color:#8fe6c4}
.actor .ai svg{width:26px;height:26px}
.actor b{font-family:var(--serif);font-size:17px;color:#fff;font-weight:500;display:block}
.actor span{font-size:11.5px;color:var(--muted);display:block;margin-top:4px;line-height:1.4}
.ejebar{margin-top:18px;text-align:center;background:linear-gradient(90deg,rgba(23,179,154,.16),rgba(142,59,122,.14));border:1px solid rgba(226,195,145,.3);border-radius:14px;padding:13px 20px;font-size:13.5px;color:#f0e6d2}
.ejebar b{color:var(--gold);font-family:var(--serif);font-style:italic;font-weight:500}
.tcard{position:relative;padding:16px 16px 14px}
.tcard .tn{position:absolute;top:-11px;left:14px;background:linear-gradient(135deg,var(--teal),var(--purple));color:#fff;font-size:10px;font-weight:800;border-radius:7px;padding:3px 9px;letter-spacing:.6px}
.tcard b{font-family:var(--serif);font-size:15.5px;font-weight:500;color:#fff;display:block;line-height:1.25;margin-top:4px}
.tcard p{font-size:11px;color:#b7ccc6;margin-top:7px;line-height:1.45}
.motor{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;margin-top:6px}
.motor .mo{text-align:center;padding:20px 16px}
.motor .mo .mi{width:46px;height:46px;border-radius:14px;margin:0 auto 9px;display:grid;place-items:center}
.motor .mo.aeg .mi{background:rgba(23,179,154,.2);border:1px solid rgba(23,179,154,.45);color:#8fe6c4}
.motor .mo.ath .mi{background:rgba(142,59,122,.25);border:1px solid rgba(200,110,175,.45);color:#e8b8d8}
.motor .mo .mi svg{width:23px;height:23px}
.motor .mo b{font-size:15px;font-weight:800;letter-spacing:1.5px;color:#fff;display:block}
.motor .mo span{font-size:11px;color:var(--muted);display:block;margin-top:5px;line-height:1.4}
.motor .plus{font-family:var(--serif);font-size:30px;color:var(--gold)}
.brands{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.brands .bc{padding:13px 16px;display:flex;align-items:center;gap:12px}
.brands .bc b{font-size:13px;color:#fff}
.brands .bc span{font-size:10.5px;color:var(--muted);display:block}
.nums{display:flex;justify-content:center;gap:34px;margin-top:18px}
.nums .nu{text-align:center}
.nums .nu b{font-family:var(--serif);font-size:30px;color:var(--gold);font-weight:500;display:block}
.nums .nu span{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.seccard{padding:16px 14px;text-align:center;display:flex;flex-direction:column;min-height:196px}
.seccard .si{width:44px;height:44px;border-radius:13px;margin:0 auto 9px;background:rgba(23,179,154,.16);border:1px solid rgba(23,179,154,.35);display:grid;place-items:center;color:#8fe6c4}
.seccard .si svg{width:22px;height:22px}
.seccard b{font-family:var(--serif);font-size:15.5px;color:#fff;font-weight:500}
.seccard .reg{font-size:9.5px;color:#d9c8a8;margin-top:7px;line-height:1.5;letter-spacing:.2px}
.seccard .dol{font-size:10.5px;color:var(--muted);margin-top:6px;line-height:1.4;flex:1}
.journey{display:grid;grid-template-columns:1fr auto 1fr auto 1fr auto 1fr;gap:8px;align-items:stretch;margin-top:8px}
.journey .jc{padding:16px 13px;text-align:center}
.journey .jc .ji{width:40px;height:40px;border-radius:12px;margin:0 auto 8px;background:rgba(23,179,154,.16);border:1px solid rgba(23,179,154,.35);display:grid;place-items:center;color:#8fe6c4}
.journey .jc .ji svg{width:20px;height:20px}
.journey .jc b{font-size:12.5px;color:#fff;display:block;line-height:1.25}
.journey .jc span{font-size:10px;color:var(--muted);display:block;margin-top:4px;line-height:1.35}
.journey .ja{display:grid;place-items:center;color:#7fa39b;font-size:18px}
/* caso: slide A */
.caseh{display:flex;align-items:baseline;gap:14px;margin-bottom:14px}
.caseh .cn{font-size:10px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--teal);background:rgba(23,179,154,.12);border:1px solid rgba(23,179,154,.35);border-radius:8px;padding:4px 11px;flex:0 0 auto}
.caseh h3{font-family:var(--serif);font-size:22px;font-weight:500;color:#fff;line-height:1.2}
.caseh h3 em{font-style:italic;color:var(--gold)}
.frow{display:flex;gap:10px;padding:7px 0;border-top:1px solid rgba(255,255,255,.08);font-size:12px}
.frow:first-of-type{border-top:0}
.frow .fk{flex:0 0 108px;color:#8fb5aa;font-weight:700;font-size:10px;letter-spacing:.8px;text-transform:uppercase;padding-top:2px}
.frow .fv{flex:1;color:#dcebe5;line-height:1.45}
.frow .fv b{color:#fff}
.chipline{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chipline .rc{font-size:9.5px;font-weight:700;color:#e6d6b4;background:rgba(140,110,50,.18);border:1px solid rgba(226,195,145,.35);border-radius:6px;padding:3px 9px}
.sensi{margin-top:12px;background:rgba(120,40,40,.14);border:1px solid rgba(240,150,130,.3);border-radius:12px;padding:11px 14px;font-size:11.5px;color:#f0d5cc;display:flex;gap:9px;align-items:flex-start}
.sensi svg{width:15px;height:15px;flex:0 0 auto;margin-top:1px;color:#f0a08a}
/* caso: slide B */
.beat{display:flex;gap:11px;align-items:flex-start;padding:8px 0;border-top:1px solid rgba(255,255,255,.08)}
.beat:first-of-type{border-top:0}
.beat .bn{width:22px;height:22px;border-radius:7px;background:rgba(23,179,154,.16);border:1px solid rgba(23,179,154,.35);color:#8fe6c4;font-size:10.5px;font-weight:800;display:grid;place-items:center;flex:0 0 auto;margin-top:1px}
.beat .bx{flex:1;font-size:12px;color:#dcebe5;line-height:1.4}
.beat .bx b{color:#fff}
.beat .md{flex:0 0 auto;font-size:8.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;border-radius:6px;padding:2px 7px;margin-top:2px}
.beat .md.v{color:#8fe6c4;background:rgba(18,110,80,.25);border:1px solid rgba(23,179,154,.35)}
.beat .md.d{color:#f0d9a8;background:rgba(120,90,20,.22);border:1px solid rgba(226,195,145,.35)}
.bvbox{background:linear-gradient(120deg,rgba(23,179,154,.14),rgba(142,59,122,.12));border:1px solid rgba(226,195,145,.3);border-radius:13px;padding:13px 16px;margin-bottom:12px}
.bvbox .bt{font-size:9.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.bvbox p{font-size:12px;color:#eee3cd;line-height:1.5}
.evx{display:flex;gap:9px;align-items:flex-start;padding:6px 0;font-size:11.5px;color:#cfe2db;line-height:1.4}
.evx svg{width:14px;height:14px;flex:0 0 auto;color:#8fe6c4;margin-top:2px}
.coltit{font-size:9.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#8fb5aa;margin-bottom:8px}
/* ===== selector de idioma ENG|ES ===== */
.brandbar{position:relative}
.langsel{position:absolute;top:26px;right:30px;display:flex;align-items:center;gap:7px;z-index:60}
.langsel button{background:none;border:0;cursor:pointer;font-family:inherit;font-size:11px;font-weight:800;letter-spacing:1.2px;color:#93aca5;padding:4px 3px 5px;border-bottom:2px solid transparent}
.langsel button.on{color:#fff;border-bottom-color:#17b39a}
.langsel button:hover{color:#fff}
.langsel .sep{color:#6d837c;font-size:11px}

for(let k=0;k<N;k++){const b=document.createElement('button');b.setAttribute('aria-label','Slide '+(k+1));b.addEventListener('click',()=>{go(k);stop();});dots.appendChild(b);}
function render(){
  const s=SLIDES[i];
  document.getElementById('capStep').textContent=s.sec;
  document.getElementById('capTitle').innerHTML=s.t;
  document.getElementById('capText').textContent=s.d.replace(/<[^>]+>/g,'');
  stage.innerHTML=s.html();
  Array.prototype.forEach.call(dots.children,(b,x)=>{b.className=x===i?'on':(x<i?'done':'');});
  applyLang();
}
function go(n){i=Math.max(0,Math.min(N-1,n));render();try{history.replaceState(null,'','?p='+(i+1)+(LANG==='en'?'&lang=en':''));}catch(e){}}
function next(){go(Math.min(N-1,i+1));}function prev(){go(Math.max(0,i-1));}
function stop(){playing=false;if(timer){clearInterval(timer);timer=null;}document.getElementById('playIcon').innerHTML='<path d="M8 5v14l11-7z" fill="currentColor"/>';}
function start(){playing=true;document.getElementById('playIcon').innerHTML='<path d="M7 5h3v14H7zM14 5h3v14h-3z" fill="currentColor"/>';timer=setInterval(()=>{ if(i===N-1){go(0);} else next(); },6500);}
document.getElementById('next').addEventListener('click',()=>{next();stop();});
document.getElementById('prev').addEventListener('click',()=>{prev();stop();});
document.getElementById('play').addEventListener('click',function(){playing?stop():start();this.setAttribute('aria-label',playing?'Pausar':'Reproducir');});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'){next();stop();}else if(e.key==='ArrowLeft'){prev();stop();}});
(function(){const m=(location.search.match(/[?&]p=(\d+)/)||location.hash.match(/#p?(\d+)/));if(m){i=Math.max(0,Math.min(N-1,parseInt(m[1],10)-1));}})();
render();
</script>
</body>
</html>
