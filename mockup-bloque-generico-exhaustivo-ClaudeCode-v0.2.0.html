<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>MCCP · Bloque genérico E01–E29 — fuera de hilo narrativo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&display=swap" rel="stylesheet">
<style>
:root{
  --nv0:#0a1226; --nv1:#0d1a34; --nv2:#0f1c39; --topbar:#0a1428;
  --line:rgba(160,190,230,.14); --line2:rgba(160,190,230,.22); --line3:#22355a;
  --blue:#306cf0; --blue2:#3877f2; --blue-soft:#1c3a63; --green:#12c98a; --amber:#e4b363;
  --tx0:#eef4fd; --tx1:#c4d3ee; --tx2:#93a6c4; --tx3:#6b7b98;
  --conv:#ffffff; --c-in:#eef1f6; --c-out:#306cf0; --c-ink:#1b2632; --c-mut:#8894a6; --c-line:#e7ebf1;
  --teal:#17b39a; --purple:#8e3b7a; --gold:#e2c391; --muted:#a3bac0;
  --sans:'Archivo',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  --serif:'Fraunces',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);color:#eef5f3;-webkit-font-smoothing:antialiased;line-height:1.45;min-height:100vh;
  background:radial-gradient(1200px 640px at 12% -4%, #164742 0%, transparent 52%),radial-gradient(1100px 720px at 92% 104%, #3d1743 0%, transparent 52%),linear-gradient(135deg,#0b2a27 0%,#10262f 46%,#241038 100%);
  background-attachment:fixed}
.app{max-width:1280px;margin:0 auto;width:100%;min-height:100vh;display:flex;flex-direction:column;padding-bottom:6px}
.brandbar{padding:20px 30px 8px}
.lockup{display:inline-flex;align-items:center;gap:15px}
.lockup svg{width:52px;height:52px;flex:0 0 auto}
.lockup .txt{border-left:2px solid rgba(23,179,154,.45);padding-left:15px}
.lockup .txt .wm{font-size:28px;font-weight:800;letter-spacing:2px;color:#fff;line-height:.95;display:block}
.lockup .txt .claim{font-family:var(--serif);font-size:21px;font-weight:500;font-style:italic;color:#eef7f4;margin-top:5px;display:block;line-height:1.05}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:2px 24px}
.cwrap{width:100%;max-width:1232px}
.caption{padding:12px 24px 4px;text-align:center;min-height:70px}
.caption .step{font-size:10.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
.caption h2{font-family:var(--serif);font-size:23px;color:#fff;font-weight:500}
.caption h2 em{font-style:italic;color:var(--gold)}
.caption p{font-size:12.5px;color:#c3d6d1;max-width:660px;margin:6px auto 0}
.seq{display:flex;align-items:center;justify-content:center;gap:14px;padding:10px 24px 20px}
.seq .nav,.seq .play{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#dfeeeb}
.seq .nav{width:40px;height:40px}.seq .play{width:48px;height:48px;background:linear-gradient(135deg,#17b39a,#8e3b7a);border:0;color:#fff}
.seq .nav:hover{border-color:var(--teal);color:#fff}
.seq .nav svg,.seq .play svg{width:19px;height:19px}
.dots{display:flex;gap:7px}
.dots button{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.24);border:0;cursor:pointer;padding:0;transition:.2s}
.dots button.on{background:var(--teal);transform:scale(1.3)}
.dots button.done{background:var(--purple)}
/* ===== Shell de consola (master D2CC-07) ===== */
.console{background:var(--nv2);border-radius:16px;overflow:hidden;border:1px solid var(--line2);
  box-shadow:0 40px 90px -30px rgba(12,24,52,.55),0 8px 24px -12px rgba(12,24,52,.4);
  display:grid;grid-template-rows:auto 1fr;height:640px}
.tbar{background:var(--topbar);border-bottom:1px solid var(--line3);display:flex;align-items:center;gap:14px;padding:0 16px;height:52px;flex:0 0 auto}
.tbar .brand{display:flex;align-items:center;gap:10px}
.tbar .brand .mk{width:30px;height:30px;border-radius:9px;background:conic-gradient(from 140deg,#17b39a,#2b6f8c 55%,#8e3b7a);display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14)}
.tbar .brand .mk svg{width:17px;height:17px}
.tbar .brand b{font-size:14px;color:#fff;font-weight:700;letter-spacing:.3px}
.tbar .brand .crumb{font-size:12px;color:var(--tx2);padding-left:11px;margin-left:4px;border-left:1px solid var(--line3)}
.tbar .search{flex:1;max-width:420px;margin:0 auto;background:#0e1c37;border:1px solid var(--line3);border-radius:9px;padding:8px 12px;display:flex;align-items:center;gap:9px;color:var(--tx3);font-size:12.5px}
.tbar .search svg{width:15px;height:15px}
.tbar .tools{display:flex;align-items:center;gap:6px;margin-left:auto}
.tbar .tb{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--tx2);cursor:pointer;position:relative}
.tbar .tb:hover{background:rgba(255,255,255,.06);color:#fff}
.tbar .tb svg{width:17px;height:17px}
.tbar .tb .dot{position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:#ff5d52;border:2px solid var(--topbar)}
.tbar .org{display:flex;align-items:center;gap:9px;padding-left:12px;margin-left:6px;border-left:1px solid var(--line3)}
.tbar .org .oi{width:30px;height:30px;border-radius:8px;background:#20345c;display:grid;place-items:center;color:#bcd0f2;font-weight:700;font-size:11px}
.tbar .org .ot b{font-size:12px;color:#e9f0fb;display:block;line-height:1.15}
.tbar .org .ot span{font-size:10px;color:var(--tx2)}
.cbody{display:grid;min-height:0}
.cbody.dual{grid-template-columns:64px 292px minmax(0,1fr) 316px}
.cbody.mod{grid-template-columns:64px minmax(0,1fr)}
@media(max-width:1280px){.cbody.dual{grid-template-columns:64px 260px minmax(0,1fr) 288px}}
/* rail */
.rail{background:var(--nv0);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px}
.rail .ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;color:var(--tx3);cursor:pointer;position:relative;transition:.15s}
.rail .ic svg{width:21px;height:21px}
.rail .ic:hover{background:rgba(255,255,255,.05);color:var(--tx1)}
.rail .ic.on{background:linear-gradient(140deg,rgba(48,108,240,.22),rgba(18,201,138,.14));color:#8fd3ff;box-shadow:inset 0 0 0 1px rgba(120,170,255,.28)}
.rail .ic.on::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:2px;background:var(--blue)}
.rail .sp{flex:1}
.rail .me{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#e4b363,#c98a3a);display:grid;place-items:center;color:#3a2906;font-weight:700;font-size:12.5px;margin-top:6px;cursor:pointer;box-shadow:0 0 0 2px rgba(255,255,255,.12)}
.rail .div{width:26px;height:1px;background:var(--line);margin:5px 0}
/* bandeja */
.bandeja{background:var(--nv1);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
.bandeja .bh{padding:14px 15px 10px;display:flex;align-items:center;gap:8px;flex:0 0 auto}
.bandeja .bh b{font-size:15px;color:#fff;font-weight:700;flex:1}
.bandeja .bh .bi{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:var(--tx2);cursor:pointer}
.bandeja .bh .bi:hover{background:rgba(255,255,255,.06);color:#fff}
.bandeja .bh .bi svg{width:16px;height:16px}
.bandeja .search{margin:0 13px 10px;background:#0b1730;border:1px solid var(--line3);border-radius:9px;padding:8px 11px;font-size:12px;color:var(--tx3);display:flex;align-items:center;gap:8px;flex:0 0 auto}
.bandeja .search svg{width:14px;height:14px}
.bandeja .tabs{display:flex;gap:4px;padding:0 13px 10px;flex:0 0 auto}
.bandeja .tabs span{font-size:11px;padding:5px 11px;border-radius:8px;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:5px}
.bandeja .tabs span.on{background:var(--blue-soft);color:#dcebff;font-weight:600}
.bandeja .tabs span .n{background:#2a4a78;color:#cfe0ff;font-size:9px;border-radius:20px;padding:0 5px;font-weight:700}
.bandeja .gt{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);padding:6px 15px 4px}
.bandeja .list{flex:1;overflow-y:auto;padding:0 8px 10px;scrollbar-width:thin}
.bandeja .list::-webkit-scrollbar{width:6px}.bandeja .list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.conv{padding:10px;border-radius:11px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;margin-bottom:2px}
.conv:hover{background:rgba(255,255,255,.04)}
.conv.on{background:#15305a;box-shadow:inset 0 0 0 1px rgba(120,170,255,.22)}
.conv .av{width:38px;height:38px;border-radius:50%;background:#22406e;display:grid;place-items:center;font-size:12px;font-weight:700;color:#d6e6fb;flex:0 0 auto;position:relative}
.conv .av.grp{border-radius:12px;background:#1d3a5c}
.conv .av .ch{position:absolute;bottom:-2px;right:-3px;width:16px;height:16px;border-radius:50%;display:grid;place-items:center;border:2px solid var(--nv1)}
.conv.on .av .ch{border-color:#15305a}
.conv .av .ch.wa{background:#25d366}.conv .av .ch.web{background:var(--blue)}.conv .av .ch.int{background:#7a5cd6}
.conv .av .ch svg{width:8px;height:8px;color:#fff}
.conv .x{flex:1;min-width:0}
.conv .x .r1{display:flex;align-items:center;gap:6px}
.conv .x .r1 b{font-size:12.5px;color:#eaf2fd;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv .x .r1 b svg{width:11px;height:11px;vertical-align:-1px;margin-left:3px}
.conv .x .r1 .t{font-size:10px;color:var(--tx3);flex:0 0 auto}
.conv .x .sn{font-size:11.5px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv .x .r3{display:flex;align-items:center;gap:5px;margin-top:5px}
.conv .x .tag{font-size:9px;color:#9fb0cf;background:rgba(120,150,200,.14);border-radius:5px;padding:1px 6px}
.conv .x .tag.sec{color:#8fe6c4;background:#123a30}
.conv .x .tag.mod{color:#f0c987;background:#3a2e13}
.conv .un{flex:0 0 auto;min-width:18px;height:18px;border-radius:20px;background:var(--blue);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;padding:0 5px;align-self:center}
/* conversación */
.cv{display:flex;flex-direction:column;background:var(--conv);min-width:0}
.cv-h{padding:11px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--c-line);flex:0 0 auto}
.cv-h .av{width:40px;height:40px;border-radius:50%;background:#eef1f6;display:grid;place-items:center;font-size:13px;font-weight:700;color:#42556a}
.cv-h .av.grp{border-radius:12px}
.cv-h .nm{min-width:0}
.cv-h .nm b{font-size:14.5px;color:#1b2430;display:flex;align-items:center;gap:6px}
.cv-h .nm b svg{width:14px;height:14px;color:var(--green)}
.cv-h .nm span{font-size:11px;color:var(--c-mut);display:flex;align-items:center;gap:6px}
.cv-h .nm span .cch{display:inline-flex;align-items:center;gap:3px}
.cv-h .nm span .cch svg{width:11px;height:11px}
.cv-h .seg{margin-left:auto;display:flex;background:#eef2f7;border-radius:9px;padding:3px}
.cv-h .nm+.hact{margin-left:auto}
.cv-h .seg button{border:0;background:transparent;font-family:var(--sans);font-size:11.5px;font-weight:600;color:#7b8a9c;padding:6px 12px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:6px}
.cv-h .seg button svg{width:12px;height:12px}
.cv-h .seg button.on{background:#fff;color:#12855c;box-shadow:0 1px 3px rgba(20,40,70,.12)}
.cv-h .seg button.on.pub{color:#3f70c9}
.cv-h .hact{display:flex;gap:3px;margin-left:4px}
.cv-h .hact .b{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:#94a3b4;cursor:pointer}
.cv-h .hact .b:hover{background:#eef2f7;color:#42556a}
.cv-h .hact .b svg{width:16px;height:16px}
.actbar{display:flex;align-items:center;gap:2px;padding:8px 12px;border-bottom:1px solid var(--c-line);background:#f8fafc;flex:0 0 auto;overflow-x:auto;scrollbar-width:none}
.actbar .grp{display:flex;align-items:center;gap:1px;flex:0 0 auto}
.actbar .sep{width:1px;height:22px;background:#dde4ec;margin:0 5px;flex:0 0 auto}
.act{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:#5a6b7e;background:transparent;border:1px solid transparent;cursor:pointer;flex:0 0 auto}
.act svg{width:17.5px;height:17.5px}
.act:hover{background:#fff;border-color:#dbe3ec;color:#1f3350;box-shadow:0 2px 6px -3px rgba(20,40,70,.18)}
.act.pri:hover{color:var(--blue);border-color:#c3d6f7}
.act.sec:hover{color:var(--green);border-color:#bfe6d5}
.act.warn:hover{color:#c0552f;border-color:#f0d2c6}
.act.on{background:linear-gradient(120deg,var(--green),#0e9e6f);color:#fff;border-color:transparent}
.act.onwarn{background:linear-gradient(120deg,#e08a4f,#c0552f);color:#fff;border-color:transparent}
.actbar .lbl{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#a7b4c4;margin-right:3px;flex:0 0 auto}
.cv-b{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;background:#fff;scrollbar-width:thin}
.cv-b::-webkit-scrollbar{width:6px}.cv-b::-webkit-scrollbar-thumb{background:#dfe5ec;border-radius:3px}
.sys{align-self:center;background:#eef2f7;color:#5a6b7d;font-size:10px;padding:5px 12px;border-radius:20px;text-align:center;max-width:82%;display:flex;align-items:center;gap:6px}
.sys svg{width:12px;height:12px;color:var(--green);flex:0 0 auto}
.sys.warn svg{color:#c98a3a}
.msg{max-width:66%;padding:8px 12px 6px;border-radius:13px;font-size:12.5px;line-height:1.4;position:relative}
.msg.in{background:var(--c-in);color:#26333d;align-self:flex-start;border-bottom-left-radius:4px}
.msg.out{background:var(--c-out);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg .m{font-size:9px;opacity:.62;float:right;margin:4px 0 0 10px}
.msg.out .m{opacity:.8}
.msg .who{display:block;font-size:10px;font-weight:700;margin-bottom:2px;color:#4d75c4}
.msg.blocked{background:#fdecec;border:1px solid #f3c1c1;color:#8c2f2f;align-self:flex-end;border-bottom-right-radius:4px}
.msg.blocked .bi{display:flex;align-items:center;gap:6px;font-weight:600;margin-bottom:3px}
.msg.blocked .bi svg{width:13px;height:13px;color:#c04747}
.msg.blocked .ft{display:block;font-size:9.5px;color:#b06a6a;margin-top:3px}
.msg.held{background:#fbf4e4;border:1px solid #ecd9ae;color:#6e5312;align-self:flex-start;border-bottom-left-radius:4px}
.msg.held .bi{display:flex;align-items:center;gap:6px;font-weight:600;font-size:12px}
.msg.held .bi svg{width:13px;height:13px;color:#c98a3a}
.msg.held .vw{display:inline-block;margin-top:5px;font-size:10.5px;font-weight:700;color:#8a6215;background:#fff;border:1px solid #ecd9ae;border-radius:7px;padding:3px 9px;cursor:pointer}
.cv-f{padding:11px 14px;border-top:1px solid var(--c-line);flex:0 0 auto;background:#fff}
.cv-f .tools{display:flex;align-items:center;gap:2px;margin-bottom:8px}
.cv-f .tools .t{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:#9aa7b6;cursor:pointer}
.cv-f .tools .t:hover{background:#f2f5f9;color:#42556a}
.cv-f .tools .t svg{width:17px;height:17px}
.cv-f .tools .sp{flex:1}
.cv-f .tools .chip{font-size:10.5px;color:#5a6b7e;background:#eef2f7;border-radius:7px;padding:4px 9px;display:flex;align-items:center;gap:5px;cursor:pointer}
.cv-f .tools .chip svg{width:12px;height:12px}
.cv-f .row{display:flex;align-items:center;gap:10px}
.cv-f .in{flex:1;background:#f2f5f9;border:1px solid #e4e9f0;border-radius:10px;padding:11px 13px;font-size:12.5px;color:#9aa7b6}
.cv-f .snd{background:var(--blue2);color:#fff;border-radius:10px;padding:11px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;cursor:pointer}
.cv-f .snd svg{width:15px;height:15px}
/* panel derecho */
.panel{background:#0c1526;border-left:1px solid var(--line);overflow-y:auto;scrollbar-width:thin}
.panel::-webkit-scrollbar{width:6px}.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.panel .ph{padding:20px 16px 16px;text-align:center;border-bottom:1px solid var(--line)}
.panel .ph .big{width:64px;height:64px;border-radius:50%;margin:0 auto 10px;background:linear-gradient(135deg,#2a4064,#182339);display:grid;place-items:center;color:#cdd9ec;font-weight:700;font-size:22px;position:relative;box-shadow:0 0 0 3px rgba(120,170,255,.1)}
.panel .ph .big.grp{border-radius:18px}
.panel .ph .big .on{position:absolute;bottom:2px;right:2px;width:14px;height:14px;border-radius:50%;background:var(--green);border:2.5px solid #0c1526}
.panel .ph .nm{font-size:16px;color:#fff;font-weight:600}
.panel .ph .vf{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--green);margin-top:6px;background:#0f2a22;border:1px solid #1c4a3a;border-radius:20px;padding:3px 10px}
.panel .ph .vf svg{width:12px;height:12px}
.panel .ph .quick{display:flex;justify-content:center;gap:7px;margin-top:12px}
.panel .ph .quick .q{width:34px;height:34px;border-radius:10px;background:#12213c;border:1px solid var(--line3);display:grid;place-items:center;color:var(--tx1);cursor:pointer}
.panel .ph .quick .q:hover{background:#17284a;color:#fff}
.panel .ph .quick .q svg{width:16px;height:16px}
.panel .ph .vf.wt{color:#e4b363;background:#2c2210;border-color:#4a3a18}
.panel .sec{padding:15px 16px;border-bottom:1px solid var(--line)}
.panel .sec .t{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--tx2);font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.panel .sec .t svg{width:13px;height:13px;color:#7fbfff}
.row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px}
.row .k{color:var(--tx2);flex:0 0 auto;width:78px}
.row .v{color:#e6eefb;font-weight:500;flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.row .v.ok{color:var(--green)}
.row .v.warn{color:#e4b363}
.row .v .mask{letter-spacing:1px}
.row .v svg{width:13px;height:13px}
.row .reveal{margin-left:auto;width:26px;height:26px;border-radius:7px;display:grid;place-items:center;color:var(--tx3);background:#101f3a;border:1px solid var(--line3);cursor:pointer;flex:0 0 auto}
.row .reveal svg{width:13px;height:13px}
.audit-note{display:flex;gap:7px;align-items:flex-start;font-size:10px;color:var(--tx3);margin-top:10px;background:#0e1b33;border-radius:8px;padding:8px 10px}
.audit-note svg{width:13px;height:13px;flex:0 0 auto;margin-top:1px;color:#7fbfff}
.badge{font-size:10px;font-weight:700;border-radius:6px;padding:2px 9px;letter-spacing:.3px}
.badge.tram{color:#e6b45a;background:#3a2e13}
.pl{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:12px;color:#dbe6f7}
.pl .pav{width:30px;height:30px;border-radius:50%;background:#22406e;display:grid;place-items:center;font-size:10.5px;font-weight:700;color:#d6e6fb;flex:0 0 auto}
.pl .pr{font-size:9.5px;color:var(--tx3);margin-left:auto;background:#101f3a;border:1px solid var(--line3);border-radius:6px;padding:2px 7px}
/* ===== Pantallas de módulo ===== */
.mod{background:#f2f5f9;overflow-y:auto;min-width:0;scrollbar-width:thin}
.mod .mh{background:#fff;border-bottom:1px solid #e4e9f0;padding:16px 24px;display:flex;align-items:center;gap:12px}
.mod .mh .ic{width:38px;height:38px;border-radius:11px;background:linear-gradient(140deg,rgba(48,108,240,.14),rgba(18,201,138,.1));border:1px solid #dbe6f5;display:grid;place-items:center;color:#2c5fb0}
.mod .mh .ic svg{width:19px;height:19px}
.mod .mh .tt2 b{font-size:15.5px;color:#1b2839;display:block}
.mod .mh .tt2 span{font-size:11.5px;color:#68788f}
.mod .mh .cta{margin-left:auto;background:var(--blue2);color:#fff;border-radius:9px;padding:9px 16px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;cursor:pointer}
.mod .mh .cta svg{width:14px;height:14px}
.mod .mx{padding:20px 24px;display:grid;gap:14px}
.mcard{background:#fff;border:1px solid #e4e9f0;border-radius:13px;padding:16px 18px;box-shadow:0 6px 18px -12px rgba(20,40,70,.18)}
.mcard .ct{font-size:12.5px;font-weight:700;color:#25324a;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.mcard .ct svg{width:15px;height:15px;color:#2c5fb0}
.mcard .cd{font-size:11.5px;color:#68788f}
.bd{font-size:9.5px;font-weight:700;border-radius:6px;padding:2px 8px;letter-spacing:.4px;text-transform:uppercase}
.bd.ok{color:#0d7a52;background:#e0f5ec}.bd.pen{color:#8a6215;background:#faf0dc}.bd.rej{color:#a63a3a;background:#fbe4e4}.bd.dis{color:#5a6b7e;background:#edf1f6}
.sw{width:38px;height:21px;border-radius:20px;background:#d5dde8;position:relative;flex:0 0 auto;cursor:pointer}
.sw::after{content:"";position:absolute;top:2.5px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:.15s}
.sw.on{background:var(--green)}.sw.on::after{left:19px}
.mrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid #eef1f6;font-size:12.5px;color:#2a3850}
.mrow:first-of-type{border-top:0}
.mrow .mi{width:32px;height:32px;border-radius:9px;background:#f3f6fb;border:1px solid #e5eaf2;display:grid;place-items:center;color:#3a4d66;flex:0 0 auto}
.mrow .mi svg{width:16px;height:16px}
.mrow .mtx{flex:1;min-width:0}
.mrow .mtx b{font-size:12.5px;color:#26333d;display:block}
.mrow .mtx span{font-size:10.5px;color:#77869c}
.mgrid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mgrid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1100px){.mgrid3{grid-template-columns:1fr}.mgrid2{grid-template-columns:1fr}}
.pipe{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:10px;align-items:stretch}
.pipe .arrow{display:grid;place-items:center;color:#9fb0c8;font-size:20px}
.pipe .pc{background:#fff;border:1px solid #e4e9f0;border-radius:12px;padding:14px}
.pipe .pc.hoy{border-color:#bfe6d5;box-shadow:0 0 0 3px rgba(18,201,138,.08)}
.pipe .pc h4{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#4a5a74;display:flex;align-items:center;gap:7px;margin-bottom:8px}
.pipe .pc h4 svg{width:14px;height:14px;color:#2c5fb0}
.pipe .pc p{font-size:11px;color:#68788f;margin-top:7px}
.tok{display:inline-block;font-size:10px;font-weight:700;background:#eef2f9;border:1px solid #dde5f0;border-radius:6px;padding:2px 8px;color:#3a4d66;margin:2px 3px 2px 0}
.tok.red{background:#fdecec;border-color:#f3c1c1;color:#a63a3a}
.tok.grn{background:#e0f5ec;border-color:#bfe6d5;color:#0d7a52}
/* canvas builder */
.canvas{position:relative;background:#fff;border:1px solid #e4e9f0;border-radius:13px;height:340px;overflow:hidden;
  background-image:radial-gradient(#e7ecf3 1px, transparent 1px);background-size:22px 22px}
.node{position:absolute;background:#fff;border:1.6px solid #d7dfeb;border-radius:11px;padding:9px 13px;box-shadow:0 6px 16px -10px rgba(20,40,70,.3);min-width:128px}
.node h5{font-size:8.5px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;color:#8794ab;display:flex;align-items:center;gap:5px}
.node h5 svg{width:11px;height:11px}
.node b{font-size:12px;color:#22314a}
.node.start{border-color:#8fd3b8}.node.start h5{color:#0d7a52}
.node.ia{border-color:#9fb4ec;box-shadow:0 0 0 3px rgba(48,108,240,.09)}.node.ia h5{color:#2c5fb0}
.node.end{border-color:#e5c08e}.node.end h5{color:#8a6215}
.node .sub{display:block;font-size:9.5px;color:#7d8ba1;margin-top:2px}
.canvas svg.wires{position:absolute;inset:0;width:100%;height:100%}
.nodepal{background:#fff;border:1px solid #e4e9f0;border-radius:13px;padding:14px;width:180px;flex:0 0 auto}
.nodepal .tabs2{display:flex;gap:4px;margin-bottom:10px}
.nodepal .tabs2 span{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:7px;color:#7b8a9c;cursor:pointer}
.nodepal .tabs2 span.on{background:#eef2f9;color:#2c5fb0}
.nodepal .np{display:flex;align-items:center;gap:8px;font-size:11.5px;color:#2a3850;padding:7px 8px;border:1px solid #e7ecf3;border-radius:9px;margin-bottom:6px;cursor:grab;background:#fbfcfe}
.nodepal .np svg{width:14px;height:14px;color:#5a7099}
/* tabla plantillas */
.ttable{width:100%;border-collapse:collapse;font-size:12px}
.ttable th{font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#8794ab;text-align:left;padding:8px 10px;border-bottom:1px solid #e4e9f0}
.ttable td{padding:11px 10px;border-bottom:1px solid #eef1f6;color:#2a3850;vertical-align:middle}
.ttable td b{color:#22314a}
.ttable td .cat{font-size:9.5px;font-weight:700;color:#5a6b7e;background:#edf1f6;border-radius:5px;padding:2px 7px;text-transform:uppercase;letter-spacing:.4px}
/* garantías / export */
.gline{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-top:1px solid #eef1f6}
.gline:first-of-type{border-top:0}
.gline .gi{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto;background:#f3f6fb;border:1px solid #e5eaf2;color:#3a4d66}
.gline .gi svg{width:15px;height:15px}
.gline .gx b{font-size:12px;color:#26333d;display:block}
.gline .gx span{font-size:10.5px;color:#77869c;line-height:1.35}
.gline .bd{margin-left:auto;flex:0 0 auto}
.keychain{display:flex;flex-direction:column;gap:9px;align-items:center}
.keychain .kc{width:100%;max-width:420px;background:#fff;border:1px solid #e4e9f0;border-radius:11px;padding:11px 14px;display:flex;align-items:center;gap:11px}
.keychain .kc .ki{width:32px;height:32px;border-radius:9px;background:#f3f6fb;border:1px solid #e5eaf2;display:grid;place-items:center;color:#2c5fb0;flex:0 0 auto}
.keychain .kc .ki svg{width:16px;height:16px}
.keychain .kc b{font-size:12.5px;color:#22314a;display:block}
.keychain .kc span{font-size:10.5px;color:#77869c}
.keychain .kv{color:#9fb0c8;font-size:15px;line-height:.6}
.segkh{display:inline-flex;background:#edf1f6;border-radius:9px;padding:3px;margin-bottom:12px}
.segkh span{font-size:11.5px;font-weight:700;padding:6px 16px;border-radius:7px;color:#7b8a9c;cursor:pointer}
.segkh span.on{background:#fff;color:#2c5fb0;box-shadow:0 1px 3px rgba(20,40,70,.12)}
/* login (E01) */
.loginstage{display:grid;place-items:center;background:radial-gradient(760px 420px at 50% -10%,#13284e 0%,transparent 62%),var(--nv0)}
.lcards{display:flex;gap:18px;align-items:stretch;flex-wrap:wrap;justify-content:center}
.lcard{width:330px;background:var(--nv1);border:1px solid var(--line2);border-radius:16px;padding:24px 22px;box-shadow:0 24px 60px -28px rgba(0,0,0,.6);position:relative}
.lcard .lstep{font-size:9.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#7fbfff;margin-bottom:10px}
.lcard h3{font-size:15px;color:#fff;font-weight:700;margin-bottom:3px}
.lcard .lsub{font-size:11px;color:var(--tx2);margin-bottom:14px}
.lfield{background:#0b1730;border:1px solid var(--line3);border-radius:9px;padding:10px 12px;font-size:12px;color:var(--tx1);margin-bottom:9px;display:flex;align-items:center;gap:8px}
.lfield svg{width:14px;height:14px;color:var(--tx3);flex:0 0 auto}
.lfield.ok{border-color:#1c4a3a;color:var(--green)}
.lbtn{background:var(--blue2);color:#fff;border-radius:9px;padding:10px 0;font-size:12.5px;font-weight:700;text-align:center;cursor:pointer;margin-top:4px}
.lotp{display:flex;gap:7px;justify-content:center;margin:6px 0 12px}
.lotp span{width:36px;height:44px;border-radius:9px;background:#0b1730;border:1px solid var(--line3);display:grid;place-items:center;font-size:17px;font-weight:700;color:#eaf2fd}
.lotp span.cur{border-color:var(--blue);box-shadow:0 0 0 3px rgba(48,108,240,.18)}
.lnote{display:flex;gap:7px;align-items:flex-start;font-size:10px;color:var(--tx3);margin-top:12px;background:#0e1b33;border-radius:8px;padding:8px 10px}
.lnote svg{width:13px;height:13px;flex:0 0 auto;margin-top:1px;color:#7fbfff}
/* nota interna (E11) */
.msg.inote{background:#fdf6df;border:1px dashed #dfc98b;color:#6e5312;align-self:flex-end;border-bottom-right-radius:4px;max-width:72%}
.msg.inote .bi{display:flex;align-items:center;gap:6px;font-weight:700;font-size:10.5px;margin-bottom:3px;color:#8a6215}
.msg.inote .bi svg{width:12px;height:12px}
.msg.inote .mn{color:#2c5fb0;font-weight:700;background:#eaf1fd;border-radius:5px;padding:0 4px}
/* llamada de equipo (E13) */
.callwrap{background:#0a1226;display:flex;flex-direction:column;min-width:0}
.tiles{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px 18px;min-height:0}
.tile{background:linear-gradient(160deg,#16294e,#0d1a34);border:1px solid var(--line2);border-radius:14px;display:grid;place-items:center;position:relative;min-height:150px}
.tile .tav{width:62px;height:62px;border-radius:50%;background:#22406e;display:grid;place-items:center;font-size:19px;font-weight:700;color:#d6e6fb}
.tile .tn{position:absolute;left:10px;bottom:8px;font-size:10.5px;color:#cfe0f5;background:rgba(6,12,26,.6);border-radius:7px;padding:3px 8px}
.tile .tmic{position:absolute;right:10px;bottom:8px;width:22px;height:22px;border-radius:50%;background:rgba(6,12,26,.6);display:grid;place-items:center;color:#8fe6c4}
.tile .tmic svg{width:12px;height:12px}
.tile.speaking{border-color:rgba(18,201,138,.55);box-shadow:0 0 0 3px rgba(18,201,138,.14)}
.subline{align-self:center;background:rgba(6,12,26,.78);border:1px solid var(--line3);color:#dfeaf8;font-size:11.5px;border-radius:9px;padding:7px 14px;margin:0 18px}
.subline b{color:#8fd3ff}
.callbar{display:flex;justify-content:center;align-items:center;gap:10px;padding:14px}
.cbtn{width:42px;height:42px;border-radius:50%;background:#16294e;border:1px solid var(--line3);display:grid;place-items:center;color:#cfe0f5;cursor:pointer}
.cbtn svg{width:18px;height:18px}
.cbtn:hover{background:#1d3560;color:#fff}
.cbtn.end{background:#c04747;border-color:transparent;color:#fff;width:52px;border-radius:22px}
.recchip{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:#ffb3ab;background:rgba(192,71,71,.16);border:1px solid rgba(192,71,71,.4);border-radius:20px;padding:3px 10px}
.recchip .rd{width:7px;height:7px;border-radius:50%;background:#ff5d52}
/* audio + transcripción (E22) */
.audio{display:flex;align-items:center;gap:10px;min-width:190px}
.audio .pl2{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.22);display:grid;place-items:center;color:#fff;flex:0 0 auto}
.audio .pl2 svg{width:13px;height:13px}
.wave{display:flex;gap:2.5px;align-items:center;flex:1}
.wave i{width:3px;border-radius:2px;background:rgba(255,255,255,.65)}
.trans{background:#f4f7fb;border:1px solid #e0e7f0;border-radius:11px;padding:10px 12px;margin-top:6px;font-size:11.5px;color:#3a4a5e;line-height:1.5}
.trans .th{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#4a5a74;margin-bottom:6px}
.trans .th svg{width:13px;height:13px;color:#2c5fb0}
.trans mark{background:#fff3c4;border-radius:3px;padding:0 2px;color:#6e5312}
/* barras insights (E25) */
.bars{display:flex;gap:12px;align-items:flex-end;height:110px;padding:6px 4px 0}
.bars .bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.bars .b{width:70%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,#3877f2,#2c5fb0)}
.bars .bl{font-size:9px;color:#8794ab;font-weight:700}
/* blob BD (E26) */
.blob{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;line-height:1.65;color:#7fd8c2;background:#0a1226;border:1px solid var(--line3);border-radius:10px;padding:12px;word-break:break-all}
.dbrow{display:flex;gap:8px;align-items:center;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;color:#93a6c4;padding:6px 8px;border-bottom:1px dashed #22355a}
.dbrow b{color:#c4d3ee;font-weight:600}
.dbrow .miss{color:#e4b363;font-style:italic}
/* matriz RBAC (E04) */
.ttable td .yes{color:#0d7a52}.ttable td .no{color:#c8d2de}
.ttable td svg{width:15px;height:15px;vertical-align:-3px}
</style>
</head>

</div>

        <div class="gline"><div class="gi">${SVGS.check}</div><div class="gx"><b>Sin exit fees · plan de salida</b><span>Portabilidad y reversibilidad documentadas.</span></div><span class="bd ok">Verificado</span></div></div>
    </div>
    <div class="mcard" style="display:flex;align-items:center;gap:14px"><div class="mi" style="width:38px;height:38px;border-radius:11px;background:#f3f6fb;border:1px solid #e5eaf2;display:grid;place-items:center;color:#0d7a52">${SVGS.export}</div><div style="flex:1"><b style="font-size:13px;color:#22314a">Walk-away con dato cifrado + clave propia</b><div style="font-size:11.5px;color:#68788f">El cliente se va llevándose su dato cifrado y su clave, y lo rehidrata en otra parte.</div></div><span class="bd pen">Diseño</span></div>
    </div></div>`); } }
];

/* ================= motor + secuenciador (capa de página del hilo narrativo validado) ================= */
const SC=SCENES; // recorrido completo E01-E29 (la cata v0.2.0 filtraba con KEEP)
const N=SC.length; let i=0, playing=false, timer=null;
const stage=document.getElementById('stage'), dots=document.getElementById('dots');
for(let k=0;k<N;k++){const b=document.createElement('button');b.setAttribute('aria-label','Escena '+(k+1));b.addEventListener('click',()=>{go(k);stop();});dots.appendChild(b);}
function render(){
  const s=SC[i];
  document.getElementById('capStep').textContent=`${s.id} · ${i+1}/${N} · ${s.bloque} — ${s.mad[1]}`;
  document.getElementById('capTitle').innerHTML=s.title;
  document.getElementById('capText').textContent=s.desc.replaceAll('[Organización]','[Organización]');
  stage.innerHTML=s.html();
  Array.prototype.forEach.call(dots.children,(b,x)=>{b.className=x===i?'on':(x<i?'done':'');});
  bindTips();
}
function go(n){i=Math.max(0,Math.min(N-1,n));render();try{history.replaceState(null,'','?p='+(i+1));}catch(e){}}
function next(){go((i+1)%N);}function prev(){go(Math.max(0,i-1));}
function stop(){playing=false;if(timer){clearInterval(timer);timer=null;}document.getElementById('playIcon').innerHTML='<path d="M8 5v14l11-7z" fill="currentColor"/>';}
function start(){playing=true;document.getElementById('playIcon').innerHTML='<path d="M7 5h3v14H7zM14 5h3v14h-3z" fill="currentColor"/>';timer=setInterval(()=>{next();},5200);}
document.getElementById('next').addEventListener('click',()=>{next();stop();});
document.getElementById('prev').addEventListener('click',()=>{prev();stop();});
document.getElementById('play').addEventListener('click',()=>{playing?stop():start();});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'){next();stop();}else if(e.key==='ArrowLeft'){prev();stop();}});
/* tooltips en portal (master) */
let tt=null;
function hideTip(){if(tt){tt.remove();tt=null;}}
function showTip(el){hideTip();const tip=el.getAttribute('data-tip');if(!tip)return;tt=document.createElement('div');tt.className='tt';tt.textContent=tip;document.body.appendChild(tt);
  const r=el.getBoundingClientRect(),t=tt.getBoundingClientRect(),pad=6,gap=8;let x,y;
  if(el.classList.contains('tip-r')){x=r.right+gap;y=r.top+(r.height-t.height)/2;if(x+t.width>window.innerWidth-pad)x=r.left-t.width-gap;}
  else{x=r.left+(r.width-t.width)/2;y=r.bottom+gap;if(y+t.height>window.innerHeight-pad)y=r.top-t.height-gap;}
  x=Math.max(pad,Math.min(x,window.innerWidth-pad-t.width));y=Math.max(pad,Math.min(y,window.innerHeight-pad-t.height));
  tt.style.left=Math.round(x)+'px';tt.style.top=Math.round(y)+'px';tt.classList.add('show');/* síncrono: el layout ya está forzado por getBoundingClientRect; con rAF el tooltip no aparecía en paneles/pestañas con frames suspendidos */}
function bindTips(){document.querySelectorAll('[data-tip]').forEach(el=>{el.addEventListener('mouseenter',()=>showTip(el));el.addEventListener('mouseleave',hideTip);});}
window.addEventListener('scroll',hideTip,true);window.addEventListener('resize',hideTip);
/* estilo tooltip */
const st=document.createElement('style');st.textContent='.tt{position:fixed;z-index:9999;background:#0a1428;color:#eaf2fd;font-size:11px;font-weight:600;white-space:nowrap;padding:6px 10px;border-radius:8px;box-shadow:0 12px 26px -8px rgba(0,0,0,.55);border:1px solid rgba(160,190,230,.24);pointer-events:none;opacity:0;transition:opacity .1s ease}.tt.show{opacity:1}';document.head.appendChild(st);
/* deep-link ?p=N */
(function(){const m=(location.search.match(/[?&]p=(\d+)/)||location.hash.match(/#p?(\d+)/));if(m){i=Math.max(0,Math.min(N-1,parseInt(m[1],10)-1));}})();
render();
</script>
