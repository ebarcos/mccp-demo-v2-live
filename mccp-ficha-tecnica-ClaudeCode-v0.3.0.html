/* ===== estructura de 15 slides + leyendas ===== */
const SLIDES=[
 {sec:'1.2 · Sectores objetivo · slide 1/12', t:'Los cinco <em>verticales</em>', d:'Sectores donde la conversación con el usuario final es, o acabará siendo, prueba.', html:s4},
 {sec:'1.2 · Sectores objetivo · slide 2/12', t:'El viaje que la demo <em>demuestra</em>', d:'Del canal abierto a la prueba reconstruible: el mismo arco en los cinco casos.', html:s5},
];
SECT.forEach((c,ix)=>{
  SLIDES.push({sec:`${c.num} · slide ${3+ix*2}/12`, t:`El caso: ${c.titular}`, d:c.situacion, html:()=>slideA(c)});
  SLIDES.push({sec:`${c.num} · slide ${4+ix*2}/12`, t:'La resolución y el <em>valor</em>', d:c.bv.split(';')[0]+'.', html:()=>slideB(c)});
});

/* ===== motor (capa de página del hilo narrativo validado) ===== */
const N=SLIDES.length; let i=0, playing=false, timer=null;
const stage=document.getElementById('stage'), dots=document.getElementById('dots');
for(let k=0;k<N;k++){const b=document.createElement('button');b.setAttribute('aria-label','Slide '+(k+1));b.addEventListener('click',()=>{go(k);stop();});dots.appendChild(b);}
function render(){
  const s=SLIDES[i];
  document.getElementById('capStep').textContent=s.sec;
  document.getElementById('capTitle').innerHTML=s.t;
  document.getElementById('capText').textContent=s.d.replace(/<[^>]+>/g,'');
  stage.innerHTML=s.html();
  Array.prototype.forEach.call(dots.children,(b,x)=>{b.className=x===i?'on':(x<i?'done':'');});
}
function go(n){i=Math.max(0,Math.min(N-1,n));render();try{history.replaceState(null,'','?p='+(i+1));}catch(e){}}
function next(){go(Math.min(N-1,i+1));}function prev(){go(Math.max(0,i-1));}
function stop(){playing=false;if(timer){clearInterval(timer);timer=null;}document.getElementById('playIcon').innerHTML='<path d="M8 5v14l11-7z" fill="currentColor"/>';}
function start(){playing=true;document.getElementById('playIcon').innerHTML='<path d="M7 5h3v14H7zM14 5h3v14h-3z" fill="currentColor"/>';timer=setInterval(()=>{ if(i===N-1){go(0);} else next(); },6500);}
document.getElementById('next').addEventListener('click',()=>{next();stop();});
document.getElementById('prev').addEventListener('click',()=>{prev();stop();});
document.getElementById('play').addEventListener('click',function(){playing?stop():start();this.setAttribute('aria-label',playing?'Pausar':'Reproducir');});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'){next();stop();}else if(e.key==='ArrowLeft'){prev();stop();}});
(function(){const m=(location.search.match(/[?&]p=(\d+)/)||location.hash.match(/#p?(\d+)/));if(m){i=Math.max(0,Math.min(N-1,parseInt(m[1],10)-1));}})();
render();
</script>
